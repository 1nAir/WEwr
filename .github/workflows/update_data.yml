name: Update Wealthrate Data

on:
  schedule:
    - cron: '3,11,19,27,35,43,51,59 * * * *'
  workflow_dispatch:

concurrency:
  group: wealthrate-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Execute analyzer
      env:
        WEALTHRATE1: ${{ secrets.WEALTHRATE1 }}
        WEALTHRATE2: ${{ secrets.WEALTHRATE2 }}
        WEALTHRATE3: ${{ secrets.WEALTHRATE3 }}
      run: python main.py

    - name: Commit and push results
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add index.html history.json history_companies.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update wealthrate data [skip ci]" && git push)
